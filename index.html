<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram ID Card</title>
    <style>
            *{
                margin: 0px;
                padding: 0px;
                box-sizing: border-box;
            }
            body{
                background: rgb(0, 0, 0);
                width: 100vh;
                height: 100vh;
                display: grid;
                place-content: center;
            }
            div {
                background-color: rgb(255, 255, 255);
                width: 300px;
                border-radius: 25px;
                text-align: center;
                transition: 1s;

            }
            img {
                width: 300px;
                border-top-left-radius: 20px;
                border-top-right-radius: 20px;
            
            }
            a {
                font-size: 20px;
                background-color:rgb(36, 116, 255);
                color: white;
                display: block;
                margin: 0px 65px;
                margin-top: 10px;;
                padding: 10px;
                border-radius: 15px;
                text-decoration: none;
                transition: 2s;
            }
            p {
                font-size: 15px;
                color: rgb(0, 0, 0);
                margin: 20px;
                font-size: 20px;
                margin-bottom: 30px;
                font-weight: bold;
            }
            div:hover {
                box-shadow: 0px 5px 20px 5px rgb(36, 116, 255);

            }
            a:hover {
                box-shadow: 0px 5px 10px 5px rgb(36, 116, 255);
                transform: scale(1.1);
            }

    </style>
</head>
<body>
    <div>
        <img src="ChatGPT Image May 14, 2026, 11_40_42 AM.png" alt="Vikas Photo">
        <a href="https://www.instagram.com/vikasmvs/">@vikasmvs</a>
        <p>follow for me on Instagram</p>
    </div>
</body>
</html>
